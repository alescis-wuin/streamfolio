spring:
  data:
    redis:
      url: ${STREAMFOLIO_REDIS_URL:redis://redis:6379}
  datasource:
    url: ${STREAMFOLIO_POSTGRES_URL:jdbc:postgresql://postgres:5432/streamfolio}
    driver-class-name: org.postgresql.Driver
    username: ${STREAMFOLIO_POSTGRES_USER:streamfolio}
    password: ${STREAMFOLIO_POSTGRES_PASSWORD:change-me}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration/postgresql

streamfolio:
  media:
    storage: ${STREAMFOLIO_MEDIA_STORAGE:minio}
    root: ${STREAMFOLIO_MEDIA_ROOT:/app/data/media}
  minio:
    enabled: ${STREAMFOLIO_MINIO_ENABLED:true}
    endpoint: ${STREAMFOLIO_MINIO_ENDPOINT:http://minio:9000}
    public-endpoint: ${STREAMFOLIO_MINIO_PUBLIC_ENDPOINT:http://localhost:9000}
    bucket: ${STREAMFOLIO_MINIO_BUCKET:streamfolio-media}
    access-key: ${STREAMFOLIO_MINIO_ACCESS_KEY:streamfolio}
    secret-key: ${STREAMFOLIO_MINIO_SECRET_KEY:streamfolio-minio-secret}
