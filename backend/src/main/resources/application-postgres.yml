spring:
  datasource:
    url: ${STREAMFOLIO_POSTGRES_URL:jdbc:postgresql://localhost:5432/streamfolio}
    driver-class-name: org.postgresql.Driver
    username: ${STREAMFOLIO_POSTGRES_USER:streamfolio}
    password: ${STREAMFOLIO_POSTGRES_PASSWORD:change-me}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration/postgresql

streamfolio:
  media:
    storage: local
    root: ${STREAMFOLIO_MEDIA_ROOT:./data/media}
