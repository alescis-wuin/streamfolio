server:
  port: 8080
  compression:
    enabled: true

spring:
  application:
    name: streamfolio-v1
  servlet:
    multipart:
      max-file-size: 4GB
      max-request-size: 5GB
  datasource:
    # Base volatile pour une V1 de démonstration : évite les conflits de schéma H2/Hibernate
    # entre deux lancements locaux. Voir README pour l'option persistante.
    url: jdbc:h2:mem:streamfolio;MODE=PostgreSQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: false
      path: /h2-console
  jpa:
    hibernate:
      # create-drop est volontaire pour la démo : schéma propre à chaque démarrage.
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  web:
    resources:
      cache:
        # Développement : évite de garder les anciennes miniatures/CSS/JS lors des itérations UI.
        period: 0

streamfolio:
  security:
    session-ttl: PT30M
    session-cleanup-initial-delay-ms: 300000
    session-cleanup-interval-ms: 300000
    cookie-name: STREAMFOLIO_SESSION
    cookie-secure: ${STREAMFOLIO_COOKIE_SECURE:false}
    cookie-same-site: Strict
  media:
    storage: classpath
    root: ./data/media
  admin:
    upload:
      max-video-size: 4GB
      max-subtitle-size: 2MB
      max-image-size: 10MB
  ffmpeg:
    binary: ${STREAMFOLIO_FFMPEG_BINARY:ffmpeg}
    probe-timeout: PT5S
    transcode-timeout: PT5M
    hls-segment-time: 4

logging:
  level:
    dev.sey.streamfolio: INFO
