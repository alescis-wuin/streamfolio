server:
  port: 8080
  compression:
    enabled: true

spring:
  application:
    name: streamfolio-v1
  servlet:
    multipart:
      max-file-size: 4GB
      max-request-size: 5GB
  data:
    redis:
      repositories:
        enabled: false
      url: ${STREAMFOLIO_REDIS_URL:redis://localhost:6379}
  datasource:
    # Volatile development database. Use the docker or postgres profile for durable data.
    url: jdbc:h2:mem:streamfolio;MODE=PostgreSQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: false
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: false
  web:
    resources:
      cache:
        # Développement : évite de garder les anciennes miniatures/CSS/JS lors des itérations UI.
        period: 0

streamfolio:
  security:
    session-ttl: PT30M
    session-key-prefix: ${STREAMFOLIO_SESSION_KEY_PREFIX:streamfolio:sessions:}
    session-cleanup-initial-delay-ms: 300000
    session-cleanup-interval-ms: 300000
    cookie-name: STREAMFOLIO_SESSION
    cookie-secure: ${STREAMFOLIO_COOKIE_SECURE:false}
    cookie-same-site: Strict
  media:
    storage: classpath
    root: ./data/media
  minio:
    enabled: ${STREAMFOLIO_MINIO_ENABLED:false}
    endpoint: ${STREAMFOLIO_MINIO_ENDPOINT:http://localhost:9000}
    public-endpoint: ${STREAMFOLIO_MINIO_PUBLIC_ENDPOINT:http://localhost:9000}
    bucket: ${STREAMFOLIO_MINIO_BUCKET:streamfolio-media}
    access-key: ${STREAMFOLIO_MINIO_ACCESS_KEY:streamfolio}
    secret-key: ${STREAMFOLIO_MINIO_SECRET_KEY:streamfolio-minio-secret}
    auto-create-bucket: ${STREAMFOLIO_MINIO_AUTO_CREATE_BUCKET:true}
  admin:
    upload:
      max-video-size: 4GB
      max-subtitle-size: 2MB
      max-image-size: 10MB
  ffmpeg:
    binary: ${STREAMFOLIO_FFMPEG_BINARY:ffmpeg}
    probe-binary: ${STREAMFOLIO_FFMPEG_PROBE_BINARY:ffprobe}
    probe-timeout: PT5S
    transcode-timeout: PT5M
    hls-segment-time: 4
    hls-flags: independent_segments+temp_file
    hls-playlist-type: vod
    thumbnail-count: 6
    hardware-acceleration: ${STREAMFOLIO_FFMPEG_HARDWARE_ACCELERATION:auto}
    nvidia-encoder: ${STREAMFOLIO_FFMPEG_NVIDIA_ENCODER:h264_nvenc}
    nvidia-preset: ${STREAMFOLIO_FFMPEG_NVIDIA_PRESET:fast}
    cpu-preset: ${STREAMFOLIO_FFMPEG_CPU_PRESET:veryfast}
  transcoding:
    workers: ${STREAMFOLIO_TRANSCODING_WORKERS:3}
    queue-capacity: ${STREAMFOLIO_TRANSCODING_QUEUE_CAPACITY:64}
    scheduler-workers: ${STREAMFOLIO_TRANSCODING_SCHEDULER_WORKERS:1}
    scheduler-batch-size: ${STREAMFOLIO_TRANSCODING_SCHEDULER_BATCH_SIZE:16}
    scheduler-initial-delay-ms: ${STREAMFOLIO_TRANSCODING_SCHEDULER_INITIAL_DELAY_MS:3000}
    scheduler-interval-ms: ${STREAMFOLIO_TRANSCODING_SCHEDULER_INTERVAL_MS:5000}
    max-attempts: ${STREAMFOLIO_TRANSCODING_MAX_ATTEMPTS:3}
    initial-retry-delay: ${STREAMFOLIO_TRANSCODING_INITIAL_RETRY_DELAY:PT5S}
    max-retry-delay: ${STREAMFOLIO_TRANSCODING_MAX_RETRY_DELAY:PT2M}
    restart-retry-delay: ${STREAMFOLIO_TRANSCODING_RESTART_RETRY_DELAY:PT10S}
    await-termination-seconds: ${STREAMFOLIO_TRANSCODING_AWAIT_TERMINATION_SECONDS:30}

logging:
  level:
    dev.sey.streamfolio: INFO
