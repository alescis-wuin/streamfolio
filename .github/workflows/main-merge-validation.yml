name: Main Merge Validation

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: main-merge-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-main:
    name: Validate merged main
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install validation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq ffmpeg

      - name: Run backend validation
        run: bash scripts/validate.sh

      - name: Run Playwright tests
        run: |
          npm ci
          npx playwright install --with-deps chromium
          npm run test:e2e

      - name: Upload validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: main-validation-logs
          path: build/validation-logs
          if-no-files-found: ignore

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: main-playwright-report
          path: build/playwright-report
          if-no-files-found: ignore
