services:
  streamfolio:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      STREAMFOLIO_MEDIA_STORAGE: ${STREAMFOLIO_MEDIA_STORAGE:-classpath}
      STREAMFOLIO_MEDIA_ROOT: ${STREAMFOLIO_MEDIA_ROOT:-/app/data/media}
      STREAMFOLIO_FFMPEG_BINARY: ${STREAMFOLIO_FFMPEG_BINARY:-ffmpeg}
      STREAMFOLIO_POSTGRES_URL: ${STREAMFOLIO_POSTGRES_URL:-jdbc:postgresql://postgres:5432/streamfolio}
      STREAMFOLIO_POSTGRES_USER: ${STREAMFOLIO_POSTGRES_USER:-streamfolio}
      STREAMFOLIO_POSTGRES_PASSWORD: ${STREAMFOLIO_POSTGRES_PASSWORD:-change-me}
      STREAMFOLIO_MINIO_ENDPOINT: ${STREAMFOLIO_MINIO_ENDPOINT:-http://minio:9000}
      STREAMFOLIO_MINIO_PUBLIC_ENDPOINT: ${STREAMFOLIO_MINIO_PUBLIC_ENDPOINT:-http://localhost:9000}
      STREAMFOLIO_MINIO_BUCKET: ${STREAMFOLIO_MINIO_BUCKET:-streamfolio-media}
      STREAMFOLIO_MINIO_ACCESS_KEY: ${STREAMFOLIO_MINIO_ACCESS_KEY:-streamfolio}
      STREAMFOLIO_MINIO_SECRET_KEY: ${STREAMFOLIO_MINIO_SECRET_KEY:-change-me}
    volumes:
      - ./data/media:/app/data/media
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: streamfolio
      POSTGRES_USER: streamfolio
      POSTGRES_PASSWORD: change-me
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U streamfolio -d streamfolio"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: streamfolio
      MINIO_ROOT_PASSWORD: change-me
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  minio-data:
