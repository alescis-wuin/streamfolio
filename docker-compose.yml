services:
  streamfolio:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      STREAMFOLIO_SECURITY_SESSION_STORE: ${STREAMFOLIO_SECURITY_SESSION_STORE:-redis}
      STREAMFOLIO_MEDIA_STORAGE: ${STREAMFOLIO_MEDIA_STORAGE:-local}
      STREAMFOLIO_MEDIA_ROOT: ${STREAMFOLIO_MEDIA_ROOT:-/app/data/media}
      STREAMFOLIO_FFMPEG_BINARY: ${STREAMFOLIO_FFMPEG_BINARY:-/usr/bin/ffmpeg}
      STREAMFOLIO_FFMPEG_PROBE_BINARY: ${STREAMFOLIO_FFMPEG_PROBE_BINARY:-/usr/bin/ffprobe}
      STREAMFOLIO_FFMPEG_HARDWARE_ACCELERATION: ${STREAMFOLIO_FFMPEG_HARDWARE_ACCELERATION:-auto}
      STREAMFOLIO_FFMPEG_NVIDIA_ENCODER: ${STREAMFOLIO_FFMPEG_NVIDIA_ENCODER:-h264_nvenc}
      STREAMFOLIO_TRANSCODING_WORKERS: ${STREAMFOLIO_TRANSCODING_WORKERS:-3}
      STREAMFOLIO_POSTGRES_URL: ${STREAMFOLIO_POSTGRES_URL:-jdbc:postgresql://postgres:5432/streamfolio}
      STREAMFOLIO_POSTGRES_USER: ${STREAMFOLIO_POSTGRES_USER:-streamfolio}
      STREAMFOLIO_POSTGRES_PASSWORD: ${STREAMFOLIO_POSTGRES_PASSWORD:-change-me}
      STREAMFOLIO_REDIS_URL: ${STREAMFOLIO_REDIS_URL:-redis://redis:6379}
      STREAMFOLIO_SESSION_KEY_PREFIX: ${STREAMFOLIO_SESSION_KEY_PREFIX:-streamfolio:sessions:}
      STREAMFOLIO_MINIO_ENDPOINT: ${STREAMFOLIO_MINIO_ENDPOINT:-http://minio:9000}
      STREAMFOLIO_MINIO_PUBLIC_ENDPOINT: ${STREAMFOLIO_MINIO_PUBLIC_ENDPOINT:-http://localhost:9000}
      STREAMFOLIO_MINIO_BUCKET: ${STREAMFOLIO_MINIO_BUCKET:-streamfolio-media}
      STREAMFOLIO_MINIO_ACCESS_KEY: streamfolio
      STREAMFOLIO_MINIO_SECRET_KEY: streamfolio-minio-secret
    volumes:
      - ./data/media:/app/data/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${STREAMFOLIO_POSTGRES_DB:-streamfolio}
      POSTGRES_USER: ${STREAMFOLIO_POSTGRES_USER:-streamfolio}
      POSTGRES_PASSWORD: ${STREAMFOLIO_POSTGRES_PASSWORD:-change-me}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "no", "--save", ""]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: streamfolio
      MINIO_ROOT_PASSWORD: streamfolio-minio-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  minio-data:
